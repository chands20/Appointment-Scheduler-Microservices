spring.application.name=event-processor
spring.config.import=optional:configserver:http://localhost:8888

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.connection-timeout=5s

# Spring Cloud Function — ; separates independent functions
spring.cloud.function.definition=processBooking;notifySlotCancelled

# Bindings — processBooking (BookingCreated -> BookingConfirmed)
spring.cloud.stream.bindings.processBooking-in-0.destination=booking.created
spring.cloud.stream.bindings.processBooking-in-0.group=${spring.application.name}
spring.cloud.stream.bindings.processBooking-out-0.destination=booking.confirmed

# Bindings — notifySlotCancelled
spring.cloud.stream.bindings.notifySlotCancelled-in-0.destination=slot.cancelled
spring.cloud.stream.bindings.notifySlotCancelled-in-0.group=${spring.application.name}

# Dead-letter queue for processBooking input
spring.cloud.stream.rabbit.bindings.processBooking-in-0.consumer.auto-bind-dlq=true
spring.cloud.stream.rabbit.bindings.processBooking-in-0.consumer.requeue-rejected=false

# Actuator
management.endpoints.web.exposure.include=health,info